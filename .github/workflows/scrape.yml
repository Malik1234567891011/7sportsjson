name: Refresh programs.json

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: scrape-programs
  cancel-in-progress: true

jobs:
  scrape:
    # ubuntu-latest is 24.04+ where several Puppeteer apt deps (e.g. libasound2) no longer exist → apt exits 100.
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: qidigo-scraper/package-lock.json

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libc6 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libexpat1 \
            libfontconfig1 \
            libgbm1 \
            libgcc1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libstdc++6 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            lsb-release \
            wget \
            xdg-utils

      - name: Install deps
        working-directory: qidigo-scraper
        run: npm ci

      - name: Run full scrape
        working-directory: qidigo-scraper
        run: npm run scrape:full

      - name: Validate JSON before commit
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('qidigo-scraper/programs.json', 'utf8'));
            if (!Array.isArray(data) || data.length === 0) {
              throw new Error('Invalid or empty JSON');
            }
          "

      - name: Commit updated JSON if changed
        run: |
          git add qidigo-scraper/programs.json
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto-refresh programs.json"
          git pull --rebase
          git push
