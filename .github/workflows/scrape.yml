name: Refresh programs.json

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: scrape-programs
  cancel-in-progress: true

jobs:
  scrape:
    # Noble (24.04) renamed many libs to *t64; Jammy (22.04) still uses the old names.
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: qidigo-scraper/package-lock.json

      - name: Install Chromium dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          . /etc/os-release
          # Ubuntu 24.04+ (noble): libasound2 → libasound2t64, etc. (see Playwright nativeDeps ubuntu24.04-x64)
          if [ "${VERSION_ID:-}" = "24.04" ] || [ "${VERSION_CODENAME:-}" = "noble" ]; then
            sudo apt-get install -y \
              ca-certificates \
              fonts-liberation \
              wget \
              xdg-utils \
              lsb-release \
              libasound2t64 \
              libatk-bridge2.0-0t64 \
              libatk1.0-0t64 \
              libatspi2.0-0t64 \
              libcairo2 \
              libcups2t64 \
              libdbus-1-3 \
              libdrm2 \
              libexpat1 \
              libfontconfig1 \
              libgbm1 \
              libglib2.0-0t64 \
              libgtk-3-0t64 \
              libnspr4 \
              libnss3 \
              libpango-1.0-0 \
              libpangocairo-1.0-0 \
              libstdc++6 \
              libx11-6 \
              libx11-xcb1 \
              libxcb1 \
              libxcomposite1 \
              libxcursor1 \
              libxdamage1 \
              libxext6 \
              libxfixes3 \
              libxi6 \
              libxkbcommon0 \
              libxrandr2 \
              libxrender1 \
              libxss1 \
              libxtst6
          else
            sudo apt-get install -y \
              ca-certificates \
              fonts-liberation \
              libasound2 \
              libatk-bridge2.0-0 \
              libatk1.0-0 \
              libc6 \
              libcairo2 \
              libcups2 \
              libdbus-1-3 \
              libexpat1 \
              libfontconfig1 \
              libgbm1 \
              libgcc1 \
              libglib2.0-0 \
              libgtk-3-0 \
              libnspr4 \
              libnss3 \
              libpango-1.0-0 \
              libpangocairo-1.0-0 \
              libstdc++6 \
              libx11-6 \
              libx11-xcb1 \
              libxcb1 \
              libxcomposite1 \
              libxcursor1 \
              libxdamage1 \
              libxext6 \
              libxfixes3 \
              libxi6 \
              libxrandr2 \
              libxrender1 \
              libxss1 \
              libxtst6 \
              lsb-release \
              wget \
              xdg-utils
          fi

      - name: Install deps
        working-directory: qidigo-scraper
        run: npm ci

      - name: Run full scrape
        working-directory: qidigo-scraper
        run: npm run scrape:full

      - name: Copy JSON to repo root for WordPress
        run: cp qidigo-scraper/programs.json programs.json

      - name: Validate JSON before commit
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('programs.json', 'utf8'));
            if (!Array.isArray(data) || data.length === 0) {
              throw new Error('Invalid or empty JSON');
            }
          "

      - name: Commit updated JSON if changed
        run: |
          git add -f qidigo-scraper/programs.json programs.json
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto-refresh programs.json"
          git pull --rebase
          git push
